seed: 42
window:
  window_len: 100000
  stride: 50000
  n_windows_per_epoch: 1024
  sampling_mode: random_uniform
  max_n_fraction: 0.2
encoder:
  name: nucleotide_frequency
  embedding_dim: 256
  batch_size: 16
  cache_embeddings: false
model:
  latent_count: 256
  latent_layers: 2
  num_heads: 8
  dropout: 0.1
  taxonomy_classes: 16
  habitat_labels: 3
loss_weights:
  taxonomy: 1.0
  habitat: 1.0
  mass: 1.0
train:
  epochs: 5
  learning_rate: 0.0003
  weight_decay: 0.01
  device: cpu
  log_interval: 10
  checkpoint_dir: checkpoints
  save_best: true
  save_last: true
  split_strategy: family_holdout
  dataset_csv: data/processed/training_table.csv
